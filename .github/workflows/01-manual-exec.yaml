# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: 'N1 - Execução Manual'

# gatilhos / triggers - regras de disparo
# gatilho manual = workflow_dispatch

on:
  workflow_dispatch:

# tarefas dentro da pipeline = jobs

jobs:
  # nome do job
  testes-unitarios:
    # máquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      # instalação das dependências
      - name: Instalando dependências
        run: npm ci

      - name: Mostrar ambiente e arquivos (debug)
        run: |
          echo "CWD: $(pwd)"
          echo "Listando arquivos na raiz do workspace:"
          ls -la
          echo "Node e npm versions:" 
          node -v
          npm -v

      # executar os testes unitários (verbose não falha) e gerar JSON
      - name: Executando testes (verbose, não falha)
        run: npm run test:verbose || true

      - name: Gerando relatório JSON de testes
        run: npm test

      - name: Verificar presença do relatório JSON (debug)
        if: ${{ always() }}
        run: |
          echo "--- após execução dos testes ---"
          ls -la || true
          if [ -f test-results.json ]; then
            echo "test-results.json encontrado, exibindo conteúdo (trimmed):"
            head -n 200 test-results.json || true
          else
            echo "test-results.json NÃO encontrado"
          fi

      # Salvando relatórios de testes
      - name: Salvando relatórios de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: test-results-manual
          path: test-results.json
          retention-days: 30
